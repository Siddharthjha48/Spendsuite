services:
  - type: web
    name: spendsuite-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: spendsuite-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: spendsuite-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: spendsuite-backend
          envVarKey: RENDER_EXTERNAL_URL
